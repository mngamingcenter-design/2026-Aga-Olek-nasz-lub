<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Agnieszka & Mario Alejandro · Piątek, 18 września 2026 r</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background: #fcf9f6;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }

        /* --- Hero: Fondo con desenfoque y composición --- */
    .hero-section {
      position: relative;
      width: 100%;
      border-radius: 40px 40px 32px 32px;
      overflow: hidden;
      background: #2c2c2c; /* Color de respaldo */
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }
    .hero-bg {
      width: 100%;
      height: 480px; /* Un poco más alto para dar espacio */
      object-fit: cover;
      display: block;
      filter: blur(4px) brightness(0.7); /* Desenfoque y oscurecimiento para que el texto resalte */
      transform: scale(1.05); /* Pequeño zoom para evitar bordes */
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    /* Contenedor flexible que centra todo vertical y horizontalmente */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }
    /* Círculo más grande y con borde elegante */
    .hero-circle {
      width: 160px;  /* Aumentado de 110px a 160px */
      height: 160px;
      border-radius: 50%;
      border: 6px solid rgba(255, 248, 242, 0.9);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      object-fit: cover;
      margin-bottom: 20px;
      background: #f0e4db;
      flex-shrink: 0;
    }
    /* Contenedor del texto para darle un fondo sutil y mejorar la legibilidad */
    .hero-text {
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 16px 24px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: 100%;
    }
    .hero-title {
      font-family: 'Dancing Script', cursive;
      font-size: 2.6rem;
      font-weight: 400;
      color: white;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
      line-height: 1.1;
    }
    .hero-title .amp { color: #e0d3ca; font-size: 2.2rem; padding: 0 4px; }
    .hero-date {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: rgba(255, 248, 242, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      padding: 8px 12px;
      margin: 10px auto 6px;
      display: inline-block;
      font-weight: 300;
    }
    .hero-sub {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255, 248, 242, 0.85);
      margin-top: 4px;
      font-weight: 300;
    }
    .hero-divider {
      color: rgba(255, 255, 255, 0.3);
      font-size: 1rem;
      letter-spacing: 0.3rem;
      margin-top: 8px;
    }

    /* --- Tarjetas de contenido --- */
    /* ... (el resto del CSS se mantiene igual, no lo toques) ... */
    /* --- Tarjetas de contenido --- */
    .card {
      background: rgba(255, 248, 242, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 24px 20px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.02);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: #7a6b62;
      text-align: center;
      font-weight: 300;
    }

    /* --- Contador --- */
    .count-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .count-item {
      background: rgba(255, 248, 242, 0.5);
      border-radius: 20px;
      padding: 12px 4px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .count-number {
      font-size: 2rem;
      font-weight: 300;
      color: #b28b7a;
      font-family: 'Cormorant Garamond', serif;
      line-height: 1.1;
    }
    .count-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a6b62;
      margin-top: 2px;
    }

    /* --- Misa --- */
    .church-name { font-size: 1.3rem; text-align: center; font-weight: 400; }
    .church-detail { text-align: center; font-size: 1rem; color: #7a6b62; margin-top: 4px; }

    .btn-map {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 248, 242, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid #dccfc6;
      border-radius: 40px;
      padding: 12px 20px;
      width: 100%;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: #2c2c2c;
      transition: all 0.2s;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn-map:active { transform: scale(0.97); background: #e8dbd2; }
    .btn-map svg { width: 20px; height: 20px; stroke: #b28b7a; stroke-width: 1.5; }

    .map-container {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, margin 0.3s ease;
      opacity: 0;
      margin-top: 0;
      border-radius: 20px;
    }
    .map-container.open {
      max-height: 280px;
      opacity: 1;
      margin-top: 16px;
    }
    .map-container iframe {
      width: 100%;
      height: 220px;
      border-radius: 20px;
      border: 1px solid #e8dbd2;
      display: block;
    }

    /* --- Footer --- */
    .footer-heart { text-align: center; font-size: 1.6rem; color: #d4c3b8; margin: 8px 0; }
    .footer-text { text-align: center; font-size: 0.9rem; color: #7a6b62; font-style: italic; }
    .footer-year { text-align: center; font-size: 0.7rem; color: #b8aaa0; margin-top: 12px; }

    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .text-center { text-align: center; }
  </style>
</head>
<body>

<div class="container">

  <!-- ========== HERO: FONDO + CÍRCULO ========== -->
    <div class="hero-section">
    <img src="https://i.ibb.co/SwM9F7s0/IMG-7166.jpg" alt="Tło weselne" class="hero-bg" loading="lazy" />
    <div class="hero-overlay">
      <!-- Contenedor flexible para centrar la imagen y el texto -->
      <div class="hero-content">
        <!-- Imagen circular más grande -->
        <img src="https://i.ibb.co/r2BVK7yJ/IMGnew.png" alt="Agnieszka i Mario" class="hero-circle" loading="lazy" />
        
        <!-- Texto debajo de la imagen -->
        <div class="hero-text">
          <div class="hero-title">
            <span>Agnieszka</span>
            <span class="amp">&</span>
            <span>Mario</span>
          </div>
          <div class="hero-date">Piątek, 18 września 2026 r</div>
          <div class="hero-sub">Bierzemy ślub i chcemy świętować z Tobą</div>
          <div class="hero-divider">✧ ✿ ✧</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== COUNTDOWN ========== -->
  <div class="card">
    <div class="card-title">Odliczanie</div>
    <div class="count-grid">
      <div class="count-item"><div class="count-number" id="days">00</div><div class="count-label">Dni</div></div>
      <div class="count-item"><div class="count-number" id="hours">00</div><div class="count-label">Godz.</div></div>
      <div class="count-item"><div class="count-number" id="minutes">00</div><div class="count-label">Min.</div></div>
      <div class="count-item"><div class="count-number" id="seconds">00</div><div class="count-label">Sek.</div></div>
    </div>
    <p class="text-center" style="font-size:0.75rem; color:#b8aaa0; margin-top:12px; letter-spacing:0.05em;">✧ Czekamy na Was ✧</p>
  </div>

  <!-- ========== MISA Y MAPA ========== -->
  <div class="card">
    <div class="church-name">Kościół Św. Mikołaja</div>
    <div class="church-detail">Zielona Góra – Raculi · 15:00</div>

    <button class="btn-map" id="mapToggle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="mapBtnText">Pokaż mapę</span>
    </button>

    <div class="map-container" id="mapContainer">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2461.1326337309592!2d15.566562!3d51.913291!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x470611eff4d64113%3A0xd6a6bd10adda2526!2sChurch%20of%20Sts.%20Nicholas!5e0!3m2!1spl!2spl!4v1700000000000" allowfullscreen loading="lazy"></iframe>
    </div>
  </div>

  <!-- ========== FOOTER ========== -->
  <div class="footer-heart">✿</div>
  <p class="footer-text">Z całym sercem czekamy na ten dzień</p>
  <p class="footer-year">Agnieszka &amp; Mario Alejandro · <span id="year"></span></p>

</div>

<!-- ========== SCRIPT ========== -->
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // Countdown
  const wedding = new Date('2026-09-18T15:00:00').getTime();
  const d = document.getElementById('days');
  const h = document.getElementById('hours');
  const m = document.getElementById('minutes');
  const s = document.getElementById('seconds');

  function updateCount() {
    const diff = wedding - Date.now();
    if (diff <= 0) { d.textContent = '00'; h.textContent = '00'; m.textContent = '00'; s.textContent = '00'; return; }
    d.textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
    h.textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
    m.textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    s.textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  }
  updateCount();
  setInterval(updateCount, 1000);

  // Toggle mapa
  const toggleBtn = document.getElementById('mapToggle');
  const mapContainer = document.getElementById('mapContainer');
  const btnText = document.getElementById('mapBtnText');

  toggleBtn.addEventListener('click', function() {
    const isOpen = mapContainer.classList.toggle('open');
    btnText.textContent = isOpen ? 'Ukryj mapę' : 'Pokaż mapę';
  });
</script>

</body>
</html>
